app = "tcfittrack"
primary_region = "ams"

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "fittrack_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
